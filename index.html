<!DOCTYPE html>
<html lang="lv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛶 Latvijas Ūdens Līmeņi — Kayak Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f4f7f6;
            color: #2d3748;
        }

        #map {
            width: 100vw;
            height: 100vh;
        }

        /* Custom Leaflet Marker */
        .marker-pin {
            width: 20px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        /* Remove black focus box on click */
        .leaflet-container :focus {
            outline: none !important;
        }

        .marker-pin.is-hovered {
            transform: scale(1.4) translateY(-5px);
            filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.4));
            z-index: 2000;
        }

        /* Popup Styling */
        .leaflet-popup-content-wrapper {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            padding: 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .leaflet-popup-content {
            margin: 0;
            width: 240px !important;
        }

        .leaflet-popup-tip {
            background: #ffffff;
        }

        /* Popup Structure */
        .popup-header {
            background: #edf2f7;
            padding: 12px 16px;
            font-size: 16px;
            font-weight: 700;
            color: #2d3748;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .popup-main {
            padding: 16px;
            text-align: center;
            background: #ffffff;
        }

        .popup-main-stat {
            font-size: 48px;
            font-weight: 700;
            color: #319795;
            line-height: 1;
            margin-bottom: 4px;
        }

        .popup-main-unit {
            font-size: 20px;
            color: #718096;
            font-weight: 400;
        }

        .popup-sub {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e2e8f0;
            font-size: 14px;
        }

        .popup-sub-label {
            color: #4a5568;
        }

        .popup-sub-value {
            font-weight: 600;
            color: #dd6b20;
        }

        .popup-footer {
            background: #f8fafc;
            padding: 8px 16px;
            font-size: 11px;
            color: #a0aec0;
            text-align: center;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        const map = L.map('map').setView([57.0, 24.5], 7);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        const svgIcon = (color = "#4fd1c5") => `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 36">
                <path d="M14 0C6.268 0 0 6.268 0 14c0 10.5 14 22 14 22s14-11.5 14-22C28 6.268 21.732 0 14 0z" fill="${color}"/>
                <circle cx="14" cy="13" r="4" fill="#fff"/>
            </svg>`;

        // Add river shapes to the map
        const riverLayersByName = {};
        const majorRivers = ['Daugava', 'Gauja', 'Salaca', 'Lielupe', 'Venta'];

        fetch('rivers.geojson')
            .then(res => res.json())
            .then(geojsonData => {
                // 1. Visible Layer (The lines on the map)
                const visibleLayer = L.geoJSON(geojsonData, {
                    style: (feature) => {
                        const isMajor = majorRivers.includes(feature.properties.name);
                        return {
                            color: isMajor ? '#1A365D' : '#3182ce',
                            weight: isMajor ? 3.5 : 2,
                            opacity: isMajor ? 0.8 : 0.6,
                            lineCap: 'round',
                            lineJoin: 'round'
                        };
                    },
                    onEachFeature: (feature, layer) => {
                        const riverName = feature.properties.name || 'Upe';
                        if (!riverLayersByName[riverName]) {
                            riverLayersByName[riverName] = [];
                        }
                        riverLayersByName[riverName].push(layer);
                    }
                }).addTo(map);

                // 2. Interaction Layer (Invisible thick lines for easier hovering)
                const interactionLayer = L.geoJSON(geojsonData, {
                    style: {
                        color: 'transparent',
                        weight: 20, // Much larger radius for easier hovering
                        opacity: 0
                    },
                    onEachFeature: (feature, layer) => {
                        const riverName = feature.properties.name || 'Upe';

                        // Bind tooltip only to the interaction layer so it shows up once
                        layer.bindTooltip(riverName, { sticky: true });

                        layer.on('mouseover', () => {
                            if (riverLayersByName[riverName]) {
                                riverLayersByName[riverName].forEach(l => {
                                    l.setStyle({ color: '#2b6cb0', weight: 4, opacity: 0.9 });
                                });
                            }
                        });
                        layer.on('mouseout', () => {
                            if (riverLayersByName[riverName]) {
                                riverLayersByName[riverName].forEach(l => {
                                    const isMajor = majorRivers.includes(riverName);
                                    l.setStyle({
                                        color: isMajor ? '#1A365D' : '#3182ce',
                                        weight: isMajor ? 3.5 : 2,
                                        opacity: isMajor ? 0.8 : 0.6
                                    });
                                });
                            }
                        });
                    }
                }).addTo(map);
            })
            .catch(err => console.error("Kļūda ielādējot rivers.geojson:", err));

        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                data.stations.forEach(station => {
                    const depth = station.actual_depth_m !== null ? station.actual_depth_m : '—';
                    const temp = station.water_temperature_c !== null ? `${station.water_temperature_c} °C` : '—';
                    const time = station.update_time || 'Nav datu';

                    const popupHTML = `
                        <div class="popup-header">${station.name}</div>
                        <div class="popup-main">
                            <div class="popup-main-stat">${depth}<span class="popup-main-unit"> m</span></div>
                        </div>
                        <div class="popup-sub">
                            <span class="popup-sub-label">Ūdens Temp:</span>
                            <span class="popup-sub-value">${temp}</span>
                        </div>
                        <div class="popup-footer">Atjaunots no LVĢMC: ${time}</div>
                    `;

                    const customIcon = L.divIcon({
                        html: `<div class="marker-pin">${svgIcon()}</div>`,
                        className: 'custom-marker',
                        iconSize: [20, 26],
                        iconAnchor: [10, 26],
                        popupAnchor: [0, -26]
                    });

                    const marker = L.marker([station.lat, station.lon], { icon: customIcon })
                        .bindPopup(popupHTML)
                        .addTo(map);

                    // Hover interactivity: make marker bigger
                    marker.on('mouseover', function (e) {
                        const el = this.getElement().querySelector('.marker-pin');
                        el.classList.add('is-hovered');
                    });

                    marker.on('mouseout', function (e) {
                        const el = this.getElement().querySelector('.marker-pin');
                        el.classList.remove('is-hovered');
                    });
                });
            })
            .catch(err => console.error("Kļūda ielādējot data.json:", err));
    </script>
</body>

</html>
