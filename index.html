<!DOCTYPE html>
<html lang="lv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛶 Latvijas Ūdens Līmeņi — Kayak Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: #e0e6f0;
        }

        #map {
            width: 100vw;
            height: 100vh;
        }

        /* Custom Leaflet Marker */
        .marker-pin {
            width: 28px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.5));
            transition: transform 0.2s ease;
        }

        .marker-pin:hover {
            transform: scale(1.1) translateY(-2px);
        }

        /* Popup Styling */
        .leaflet-popup-content-wrapper {
            background: linear-gradient(145deg, #1a2038, #141829);
            border: 1px solid rgba(99, 179, 237, 0.2);
            border-radius: 12px;
            overflow: hidden;
            padding: 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .leaflet-popup-content {
            margin: 0;
            width: 240px !important;
        }

        .leaflet-popup-tip {
            background: #141829;
        }

        /* Popup Structure */
        .popup-header {
            background: rgba(99, 179, 237, 0.15);
            padding: 12px 16px;
            font-size: 16px;
            font-weight: 700;
            color: #e2e8f0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .popup-main {
            padding: 16px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .popup-main-stat {
            font-size: 48px;
            font-weight: 700;
            color: #4fd1c5;
            line-height: 1;
            margin-bottom: 4px;
        }

        .popup-main-unit {
            font-size: 20px;
            color: #a0aec0;
            font-weight: 400;
        }

        .popup-sub {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        .popup-sub-label {
            color: #a0aec0;
        }

        .popup-sub-value {
            font-weight: 600;
            color: #f6ad55;
        }

        .popup-footer {
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 16px;
            font-size: 11px;
            color: #718096;
            text-align: center;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        const map = L.map('map').setView([57.0, 24.5], 7);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        const svgIcon = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 36">
                <path d="M14 0C6.268 0 0 6.268 0 14c0 10.5 14 22 14 22s14-11.5 14-22C28 6.268 21.732 0 14 0z" fill="#4fd1c5"/>
                <circle cx="14" cy="13" r="4" fill="#fff"/>
            </svg>`;

        const customIcon = L.divIcon({
            html: `<div class="marker-pin">${svgIcon}</div>`,
            className: 'custom-marker',
            iconSize: [28, 36],
            iconAnchor: [14, 36],
            popupAnchor: [0, -36]
        });

        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                data.stations.forEach(station => {
                    const depth = station.actual_depth_m !== null ? station.actual_depth_m : '—';
                    const temp = station.water_temperature_c !== null ? `${station.water_temperature_c} °C` : '—';
                    const time = station.update_time || 'Nav datu';

                    const popupHTML = `
                        <div class="popup-header">${station.name}</div>
                        <div class="popup-main">
                            <div class="popup-main-stat">${depth}<span class="popup-main-unit"> m</span></div>
                        </div>
                        <div class="popup-sub">
                            <span class="popup-sub-label">Ūdens Temp:</span>
                            <span class="popup-sub-value">${temp}</span>
                        </div>
                        <div class="popup-footer">Atjaunots no LVĢMC: ${time}</div>
                    `;

                    L.marker([station.lat, station.lon], { icon: customIcon })
                        .bindPopup(popupHTML)
                        .addTo(map);
                });
            })
            .catch(err => console.error("Kļūda ielādējot data.json:", err));
    </script>
</body>

</html>
