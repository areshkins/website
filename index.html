<!DOCTYPE html>
<html lang="lv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛶 Latvijas Ūdens Līmeņi — Kayak Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f4f7f6;
            color: #2d3748;
        }

        #map {
            width: 100vw;
            height: 100vh;
        }

        /* Filter UI */
        .filter-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8px);
            max-width: 90vw;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filter-container::-webkit-scrollbar {
            display: none;
        }

        .filter-pill {
            padding: 8px 18px;
            border-radius: 25px;
            border: 1px solid #e2e8f0;
            background: white;
            color: #4a5568;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
            outline: none;
        }

        .filter-pill:hover {
            border-color: #cbd5e0;
            background: #f7fafc;
        }

        .filter-pill.active {
            background: #007BFF;
            color: white;
            border-color: #007BFF;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }

        /* Custom Leaflet Marker */
        .marker-pin {
            width: 20px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        /* Remove black focus box on click */
        .leaflet-container :focus {
            outline: none !important;
        }

        .marker-pin.is-hovered {
            transform: scale(1.4) translateY(-5px);
            filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.4));
            z-index: 2000;
        }

        /* Popup Styling */
        .leaflet-popup-content-wrapper {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            padding: 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .leaflet-popup-content {
            margin: 0;
            width: 240px !important;
        }

        .leaflet-popup-tip {
            background: #ffffff;
        }

        /* Popup Structure */
        .popup-header {
            background: #edf2f7;
            padding: 12px 16px;
            font-size: 16px;
            font-weight: 700;
            color: #2d3748;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .popup-main {
            padding: 16px;
            text-align: center;
            background: #ffffff;
        }

        .popup-main-stat {
            font-size: 48px;
            font-weight: 700;
            color: #319795;
            line-height: 1;
            margin-bottom: 4px;
        }

        .popup-main-unit {
            font-size: 20px;
            color: #718096;
            font-weight: 400;
        }

        .popup-sub {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e2e8f0;
            font-size: 14px;
        }

        .popup-sub-label {
            color: #4a5568;
        }

        .popup-sub-value {
            font-weight: 600;
            color: #dd6b20;
        }

        .popup-footer {
            background: #f8fafc;
            padding: 8px 16px;
            font-size: 11px;
            color: #a0aec0;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="filter-container">
        <button class="filter-pill active" data-filter="all">Visas upes</button>
        <button class="filter-pill" data-filter="All Season">Visu sezonu</button>
        <button class="filter-pill" data-filter="High Water Level">Augstā ūdens līmenī</button>
        <button class="filter-pill" data-filter="Spring Floods Only">Tikai pavasara palos</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        const map = L.map('map').setView([57.0, 24.5], 7);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        const svgIcon = (color = "#4fd1c5") => `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 36">
                <path d="M14 0C6.268 0 0 6.268 0 14c0 10.5 14 22 14 22s14-11.5 14-22C28 6.268 21.732 0 14 0z" fill="${color}"/>
                <circle cx="14" cy="13" r="4" fill="#fff"/>
            </svg>`;

        const seasonalityData = {
            "All Season": [
                "Bārta", "Saka", "Venta", "Abava", "Irbe", "Rinda", "Engure", "Stende",
                "Lielupe", "Mūsa", "Mēmele", "Susēja", "Viesīte", "Iecava", "Misa",
                "Salaca", "Briede", "Seda", "Rūja", "Gauja", "Mustjegi", "Daugava",
                "Sārija", "Dubna", "Aiviekste", "Rēzekne", "Malta", "Pededze", "Ogre",
                "Mazā Jugla", "Lielā Jugla", "Zilupe", "Rītupe", "Ludza", "Kuhva",
                "Sārija", "Sarjanka", "Sarianka", "Saka"
            ],
            "High Water Level": [
                "Vārtāja", "Durbe", "Tebra", "Rīva", "Užava", "Vadakste", "Ciecere",
                "Roja", "Dursupe", "Svēte", "Tērvete", "Bērze", "Svētupe", "Vitrupe",
                "Tirza", "Palsa", "Vaidava", "Melnupe", "Brasla", "Asūnīce",
                "Dagda", "Tartaks", "Iča", "Balupe", "Liede", "Kuja", "Veseta", "Pērse",
                "Lobe", "Mergupe", "Krievupe", "Tumšupe", "Vircava", "Platone",
                "Iģe", "Ige"
            ],
            "Spring Floods Only": [
                "Liekne", "Riežupe", "Amula", "Imula", "Iģe", "Vecpalsa", "Vija",
                "Abuls", "Rauna", "Raunis", "Amata", "Ziemeļsusēja", "Arona",
                "Liekne"
            ]
        };

        let currentFilter = 'all';

        // Add river shapes to the map
        const riverLayersByName = {};

        function updateRiverStyles(filter) {
            currentFilter = filter;

            // Update buttons
            document.querySelectorAll('.filter-pill').forEach(btn => {
                if (btn.dataset.filter === filter) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Update layers
            Object.keys(riverLayersByName).forEach(riverName => {
                const layers = riverLayersByName[riverName];
                let style = {};
                let bringToFront = false;

                if (filter === 'all') {
                    style = { color: '#007BFF', weight: 2, opacity: 0.8 };
                } else {
                    const filterList = seasonalityData[filter] || [];
                    // Handle dual names like "Ludza / Лжа"
                    const nameParts = riverName.split('/').map(p => p.trim());
                    const isMatch = nameParts.some(part => filterList.includes(part));

                    if (isMatch) {
                        style = { color: '#007BFF', weight: 4, opacity: 1.0 };
                        bringToFront = true;
                    } else {
                        style = { color: '#007BFF', weight: 1, opacity: 0.25 };
                    }
                }

                layers.forEach(layer => {
                    layer.setStyle(style);
                    if (bringToFront) {
                        layer.bringToFront();
                    } else {
                        layer.bringToBack();
                    }
                });
            });
        }

        const hiddenRivers = [
            "Bērzene", "Grīva", "Jaunpalsa", "Jaunpededze", "Jaunā Veseta",
            "Kroja", "Mazbriede", "Mazirbe", "Mazā Daugava", "Misas Vecupe",
            "Moziča", "Narūta", "Pilda", "Ramata", "Sarkandaugava",
            "Sausā Daugava", "Skujaine", "Susējas HES pievads", "Vecbērze",
            "Vecpededze", "Vecventa", "Vesetas kanāls", "Vičaka", "Engures upe"
        ];

        fetch('rivers.geojson')
            .then(res => res.json())
            .then(geojsonData => {
                // 1. Visible Layer (The thin blue lines)
                const visibleLayer = L.geoJSON(geojsonData, {
                    filter: (feature) => {
                        const props = feature.properties;
                        const primaryName = props.name || props['name:lv'] || props['name:en'] || 'Upe';
                        return !hiddenRivers.includes(primaryName);
                    },
                    style: {
                        color: '#007BFF',
                        weight: 2,
                        opacity: 0.8,
                        lineCap: 'round',
                        lineJoin: 'round'
                    },
                    onEachFeature: (feature, layer) => {
                        // Check multiple name properties for border rivers
                        const props = feature.properties;
                        const potentialNames = [
                            props.name,
                            props['name:lv'],
                            props['name:en']
                        ].filter(Boolean);

                        // Use the first available name as the primary key, but index all
                        const primaryName = props.name || props['name:lv'] || props['name:en'] || 'Upe';

                        potentialNames.forEach(name => {
                            // Split dual names like "Ludza / Лжа"
                            const parts = name.split('/').map(p => p.trim());
                            parts.forEach(part => {
                                if (!riverLayersByName[part]) {
                                    riverLayersByName[part] = [];
                                }
                                riverLayersByName[part].push(layer);
                            });
                        });

                        // Also index the original full name string just in case
                        if (!riverLayersByName[primaryName]) {
                            riverLayersByName[primaryName] = [];
                        }
                        riverLayersByName[primaryName].push(layer);

                        // Store the display name on the layer for tooltips
                        layer._riverDisplayName = primaryName;
                    }
                }).addTo(map);

                // 2. Interaction Layer (Invisible thick lines for easier hovering)
                const interactionLayer = L.geoJSON(geojsonData, {
                    filter: (feature) => {
                        const props = feature.properties;
                        const primaryName = props.name || props['name:lv'] || props['name:en'] || 'Upe';
                        return !hiddenRivers.includes(primaryName);
                    },
                    style: {
                        color: 'transparent',
                        weight: 20, // Much larger radius for easier hovering
                        opacity: 0
                    },
                    onEachFeature: (feature, layer) => {
                        const props = feature.properties;
                        const riverName = props.name || props['name:lv'] || props['name:en'] || 'Upe';

                        // Bind tooltip using the display name stored earlier or derived here
                        layer.bindTooltip(riverName, { sticky: true });

                        layer.on('mouseover', () => {
                            // Match against any part of any potential name
                            const potentialNames = [
                                props.name,
                                props['name:lv'],
                                props['name:en']
                            ].filter(Boolean);

                            const allParts = new Set();
                            potentialNames.forEach(n => n.split('/').forEach(p => allParts.add(p.trim())));
                            allParts.add(riverName);

                            allParts.forEach(part => {
                                if (riverLayersByName[part]) {
                                    riverLayersByName[part].forEach(l => {
                                        l.setStyle({ color: '#2b6cb0', weight: 4, opacity: 0.9 });
                                    });
                                }
                            });
                        });
                        layer.on('mouseout', () => {
                            const props = feature.properties;
                            const potentialNames = [
                                props.name,
                                props['name:lv'],
                                props['name:en']
                            ].filter(Boolean);

                            const allParts = new Set();
                            potentialNames.forEach(n => n.split('/').forEach(p => allParts.add(p.trim())));
                            allParts.add(riverName);

                            allParts.forEach(part => {
                                if (riverLayersByName[part]) {
                                    riverLayersByName[part].forEach(l => {
                                        if (currentFilter === 'all') {
                                            l.setStyle({ color: '#007BFF', weight: 2, opacity: 0.8 });
                                        } else {
                                            const filterList = seasonalityData[currentFilter] || [];
                                            const isMatch = Array.from(allParts).some(p => filterList.includes(p));

                                            if (isMatch) {
                                                l.setStyle({ color: '#007BFF', weight: 4, opacity: 1.0 });
                                            } else {
                                                l.setStyle({ color: '#007BFF', weight: 1, opacity: 0.25 });
                                            }
                                        }
                                    });
                                }
                            });
                        });
                    }
                }).addTo(map);

                // Initialize button listeners
                document.querySelectorAll('.filter-pill').forEach(btn => {
                    btn.addEventListener('click', () => {
                        updateRiverStyles(btn.dataset.filter);
                    });
                });
            })
            .catch(err => console.error("Kļūda ielādējot rivers.geojson:", err));

        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                data.stations.forEach(station => {
                    const depth = station.actual_depth_m !== null ? station.actual_depth_m : '—';
                    const temp = station.water_temperature_c !== null ? `${station.water_temperature_c} °C` : '—';
                    const time = station.update_time || 'Nav datu';

                    const popupHTML = `
                        <div class="popup-header">${station.name}</div>
                        <div class="popup-main">
                            <div class="popup-main-stat">${depth}<span class="popup-main-unit"> m</span></div>
                        </div>
                        <div class="popup-sub">
                            <span class="popup-sub-label">Ūdens Temp:</span>
                            <span class="popup-sub-value">${temp}</span>
                        </div>
                        <div class="popup-footer">Atjaunots no LVĢMC: ${time}</div>
                    `;

                    const customIcon = L.divIcon({
                        html: `<div class="marker-pin">${svgIcon()}</div>`,
                        className: 'custom-marker',
                        iconSize: [20, 26],
                        iconAnchor: [10, 26],
                        popupAnchor: [0, -26]
                    });

                    const marker = L.marker([station.lat, station.lon], { icon: customIcon })
                        .bindPopup(popupHTML)
                        .addTo(map);

                    // Hover interactivity: make marker bigger
                    marker.on('mouseover', function (e) {
                        const el = this.getElement().querySelector('.marker-pin');
                        el.classList.add('is-hovered');
                    });

                    marker.on('mouseout', function (e) {
                        const el = this.getElement().querySelector('.marker-pin');
                        el.classList.remove('is-hovered');
                    });
                });
            })
            .catch(err => console.error("Kļūda ielādējot data.json:", err));
    </script>
</body>

</html>
